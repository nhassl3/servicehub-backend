version: "2"
sql:
  - engine: "postgresql"
    queries: "./db/query"
    schema: "./migrations"
    gen:
      go:
        package: "db"
        out: "./internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: false
        overrides:
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
          - db_type: "numeric"
            go_type: "float64"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "pg_catalog.uuid"
            go_type: "github.com/google/uuid.UUID"
