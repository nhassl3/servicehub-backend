name: go

on:
  push:
    branches: [ "main", "bugfix" ]
  pull_request:
    branches: [ "main", "bugfix" ]

jobs:
  test:
    name: Test ServiceHub services
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: servicehub
          POSTGRES_DB: servicehub
          POSTGRES_PASSWORD: ${{secrets.DATABASE_PASSWORD}}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4

      - name: Set up Go 1.25.5
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.5'

      - name: Create .env file
        run: |
          touch .env
          echo DB_NAME=servicehub >> .env
          echo DB_USER=servicehub >> .env
          echo DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} >> .env
          cat .env

      - name: Install migrate package CLI v4.19.1
        run: |
          sudo curl -L https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/bin/migrate
          which migrate

      - name: Make migrations
        run: |
          make migrate-up

      - name: Test
        run: CGO_ENABLED=1 make test